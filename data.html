<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Complete Your Purchase</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <style>body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #fcfcfc; }</style>
</head>
<body class="flex items-center justify-center min-h-screen p-6">

    <div class="w-full max-w-xl bg-white rounded-[40px] shadow-2xl shadow-gray-200/50 p-10 border border-gray-100">
        <div class="mb-10">
            <a href="index.html" class="text-sm font-medium text-gray-400 hover:text-black transition-colors">← Kembali ke Marketplace</a>
            <h2 class="text-3xl font-extrabold tracking-tight mt-6">Data Pemesanan</h2>
            <p class="text-gray-500 mt-2">Silakan isi detail Anda untuk mendapatkan akses aset digital.</p>
        </div>

        <form action="#" class="space-y-6">
            <div>
                <label class="block text-sm font-bold text-gray-700 mb-2">Nama Lengkap</label>
                <input type="text" placeholder="Masukkan nama Anda" class="w-full px-5 py-4 rounded-2xl bg-gray-50 border border-gray-100 focus:border-black focus:ring-0 outline-none transition-all" required>
            </div>

            <div>
                <label class="block text-sm font-bold text-gray-700 mb-2">Alamat Email</label>
                <input type="email" placeholder="contoh@email.com" class="w-full px-5 py-4 rounded-2xl bg-gray-50 border border-gray-100 focus:border-black focus:ring-0 outline-none transition-all" required>
                <p class="text-[11px] text-gray-400 mt-2">*Link download akan dikirimkan ke email ini.</p>
            </div>

            <div>
                <label class="block text-sm font-bold text-gray-700 mb-2">Pilih Lisensi</label>
                <div class="grid grid-cols-2 gap-4">
                    <label class="cursor-pointer">
                        <input type="radio" name="license" class="hidden peer" checked>
                        <div class="p-4 border border-gray-100 rounded-2xl text-center peer-checked:border-black peer-checked:bg-black peer-checked:text-white transition-all text-sm font-medium">
                            Personal Use
                        </div>
                    </label>
                    <label class="cursor-pointer">
                        <input type="radio" name="license" class="hidden peer">
                        <div class="p-4 border border-gray-100 rounded-2xl text-center peer-checked:border-black peer-checked:bg-black peer-checked:text-white transition-all text-sm font-medium">
                            Commercial
                        </div>
                    </label>
                </div>
            </div>

            <button type="submit" class="w-full bg-black text-white py-5 rounded-[24px] font-bold text-lg hover:bg-gray-800 transform active:scale-[0.98] transition-all shadow-lg shadow-black/10">
                Lanjutkan Pembayaran
            </button>
        </form>

        <footer class="mt-8 text-center">
            <p class="text-xs text-gray-400">Pembayaran aman & terenkripsi oleh Stripe.</p>
        </footer>
    </div>

</body>
</html>
